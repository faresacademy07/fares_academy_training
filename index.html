<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة التدريب الشخصي - Fares Academy</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #001a4d;
            --secondary: #ff3333;
            --light: #f5f5f5;
            --dark: #1a1a1a;
            --border: #ddd;
            --success: #4CAF50;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--primary) 0%, #003d99 100%);
            color: var(--dark);
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* ==================== LOGIN SCREEN ==================== */
        .auth-screen {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, var(--primary) 0%, #003d99 100%);
        }

        .auth-card {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 400px;
        }

        .auth-logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-box {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, var(--primary), #003d99);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            border: 3px solid var(--secondary);
        }

        .logo-text {
            color: var(--secondary);
            font-size: 40px;
            font-weight: bold;
        }

        .auth-logo h1 {
            color: var(--primary);
            font-size: 24px;
            margin-bottom: 5px;
        }

        .auth-logo p {
            color: var(--secondary);
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--primary);
            font-weight: 600;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid var(--border);
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--secondary);
        }

        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), #003d99);
            color: white;
            margin-bottom: 10px;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 26, 77, 0.3);
        }

        .btn-secondary {
            background: var(--secondary);
            color: white;
        }

        .btn-secondary:hover {
            background: #ff1a1a;
            transform: translateY(-2px);
        }

        .error {
            color: var(--secondary);
            font-size: 14px;
            margin-top: 10px;
            text-align: center;
        }

        /* ==================== MAIN APP ==================== */
        .app-screen {
            display: none;
        }

        .header {
            background: white;
            padding: 15px 20px;
            border-bottom: 3px solid var(--secondary);
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        .header-title {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header-logo {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--primary), #003d99);
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--secondary);
            font-weight: bold;
            border: 2px solid var(--secondary);
        }

        .header-title h1 {
            color: var(--primary);
            font-size: 20px;
        }

        .header-user {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .user-info {
            text-align: right;
            color: var(--primary);
        }

        .user-name {
            font-weight: 600;
            font-size: 14px;
        }

        .user-email {
            font-size: 12px;
            color: #666;
        }

        .btn-logout {
            background: var(--secondary);
            color: white;
            padding: 8px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
        }

        .btn-logout:hover {
            background: #ff1a1a;
        }

        .content {
            background: white;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        .section h2 {
            color: var(--primary);
            margin-bottom: 20px;
            border-bottom: 2px solid var(--secondary);
            padding-bottom: 10px;
        }

        .add-btn {
            background: var(--secondary);
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .add-btn:hover {
            background: #ff1a1a;
        }

        .subscriber-card {
            background: var(--light);
            border: 2px solid var(--border);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .subscriber-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            border-bottom: 2px solid var(--secondary);
            padding-bottom: 10px;
        }

        .subscriber-info h3 {
            color: var(--primary);
            font-size: 18px;
            margin-bottom: 5px;
        }

        .subscriber-info p {
            color: #666;
            font-size: 14px;
            margin: 3px 0;
        }

        .subscriber-stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 15px;
        }

        .stat-box {
            background: white;
            padding: 12px;
            border-radius: 5px;
            text-align: center;
            border-left: 4px solid var(--secondary);
        }

        .stat-label {
            color: #666;
            font-size: 12px;
            margin-bottom: 5px;
        }

        .stat-value {
            color: var(--primary);
            font-size: 20px;
            font-weight: bold;
        }

        .sessions-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 15px;
        }

        .sessions-table thead {
            background: var(--primary);
            color: white;
        }

        .sessions-table th {
            padding: 10px;
            text-align: center;
            font-size: 12px;
        }

        .sessions-table td {
            padding: 8px;
            text-align: center;
            border-bottom: 1px solid var(--border);
        }

        .session-input {
            width: 100%;
            padding: 6px;
            border: 1px solid var(--border);
            border-radius: 3px;
            text-align: center;
            font-size: 12px;
        }

        .session-input:focus {
            outline: none;
            border-color: var(--secondary);
            background: #fffacd;
        }

        .action-btn {
            padding: 6px 12px;
            margin: 0 3px;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
        }

        .btn-delete {
            background: var(--secondary);
            color: white;
        }

        .btn-save {
            background: var(--success);
            color: white;
        }

        /* ==================== MODAL ==================== */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 10px;
            width: 90%;
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--secondary);
            padding-bottom: 10px;
        }

        .modal-header h3 {
            color: var(--primary);
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--secondary);
        }

        .modal-body {
            margin-bottom: 20px;
        }

        .modal-footer {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        @media (max-width: 768px) {
            .subscriber-stats {
                grid-template-columns: repeat(2, 1fr);
            }

            .sessions-table {
                font-size: 11px;
            }

            .sessions-table th,
            .sessions-table td {
                padding: 6px 2px;
            }
        }
    </style>
</head>
<body>
    <!-- ==================== AUTH SCREEN ==================== -->
    <div id="authScreen" class="auth-screen">
        <div class="auth-card">
            <div class="auth-logo">
                <div class="logo-box">
                    <div class="logo-text">FA</div>
                </div>
                <h1>إدارة التدريب الشخصي</h1>
                <p>Fares Academy</p>
            </div>

            <!-- Login Form -->
            <div id="loginForm">
                <h2 style="text-align: center; color: var(--primary); margin-bottom: 20px;">تسجيل الدخول</h2>
                <div class="form-group">
                    <label>البريد الإلكتروني</label>
                    <input type="email" id="loginEmail" placeholder="your@email.com">
                </div>
                <div class="form-group">
                    <label>كلمة المرور</label>
                    <input type="password" id="loginPassword" placeholder="••••••••">
                </div>
                <button class="btn btn-primary" onclick="handleLogin()">دخول</button>
                <button class="btn btn-secondary" onclick="toggleForm()">إنشاء حساب جديد</button>
                <div id="loginError" class="error"></div>
            </div>

            <!-- Register Form -->
            <div id="registerForm" style="display: none;">
                <h2 style="text-align: center; color: var(--primary); margin-bottom: 20px;">إنشاء حساب جديد</h2>
                <div class="form-group">
                    <label>الاسم</label>
                    <input type="text" id="registerName" placeholder="اسمك">
                </div>
                <div class="form-group">
                    <label>البريد الإلكتروني</label>
                    <input type="email" id="registerEmail" placeholder="your@email.com">
                </div>
                <div class="form-group">
                    <label>كلمة المرور</label>
                    <input type="password" id="registerPassword" placeholder="••••••••">
                </div>
                <button class="btn btn-primary" onclick="handleRegister()">إنشاء الحساب</button>
                <button class="btn btn-secondary" onclick="toggleForm()">لديّ حساب بالفعل</button>
                <div id="registerError" class="error"></div>
            </div>
        </div>
    </div>

    <!-- ==================== APP SCREEN ==================== -->
    <div id="appScreen" class="app-screen">
        <div class="container">
            <!-- Header -->
            <div class="header">
                <div class="header-title">
                    <div class="header-logo">FA</div>
                    <h1>إدارة التدريب الشخصي</h1>
                </div>
                <div class="header-user">
                    <div class="user-info">
                        <div class="user-name" id="userName">المستخدم</div>
                        <div class="user-email" id="userEmail">email@example.com</div>
                    </div>
                    <button class="btn-logout" onclick="handleLogout()">تسجيل الخروج</button>
                </div>
            </div>

            <!-- Content -->
            <div class="content">
                <h2>👥 المشتركات وتتبع الجلسات</h2>
                <button class="add-btn" onclick="openAddSubscriberModal()">+ إضافة مشتركة جديدة</button>
                <div id="subscribersContainer"></div>
            </div>
        </div>
    </div>

    <!-- Add Subscriber Modal -->
    <div id="addSubscriberModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>إضافة مشتركة جديدة</h3>
                <button class="close-btn" onclick="closeModal('addSubscriberModal')">×</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>الاسم</label>
                    <input type="text" id="subscriberName" placeholder="اسم المشتركة">
                </div>
                <div class="form-group">
                    <label>رقم الجوال</label>
                    <input type="tel" id="subscriberPhone" placeholder="رقم الجوال">
                </div>
                <div class="form-group">
                    <label>عدد الجلسات</label>
                    <select id="subscriberSessions" style="width: 100%; padding: 12px; border: 2px solid var(--border); border-radius: 5px; font-size: 14px;">
                        <option value="">اختر عدد الجلسات</option>
                        <option value="6">6 جلسات - 1400 ر.س</option>
                        <option value="12">12 جلسة - 2200 ر.س</option>
                        <option value="24">24 جلسة - 4000 ر.س</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>شهر الاشتراك</label>
                    <select id="subscriberMonth" style="width: 100%; padding: 12px; border: 2px solid var(--border); border-radius: 5px; font-size: 14px;">
                        <option value="">اختر الشهر</option>
                        <option value="يناير">يناير</option>
                        <option value="فبراير">فبراير</option>
                        <option value="مارس">مارس</option>
                        <option value="أبريل">أبريل</option>
                        <option value="مايو">مايو</option>
                        <option value="يونيو">يونيو</option>
                        <option value="يوليو">يوليو</option>
                        <option value="أغسطس">أغسطس</option>
                        <option value="سبتمبر">سبتمبر</option>
                        <option value="أكتوبر">أكتوبر</option>
                        <option value="نوفمبر">نوفمبر</option>
                        <option value="ديسمبر">ديسمبر</option>
                    </select>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal('addSubscriberModal')">إلغاء</button>
                <button class="btn btn-primary" onclick="addSubscriber()">حفظ</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = window.location.origin + '/api';
        let currentUser = null;
        let token = null;

        // Pricing data
        const pricing = {
            6: { price: 1400, label: '6 جلسات' },
            12: { price: 2200, label: '12 جلسة' },
            24: { price: 4000, label: '24 جلسة' }
        };

        // Calculate commission
        function calculateCommission(sessions, completedSessions) {
            const price = pricing[sessions].price;
            const priceAfterTax = price * 0.85; // Remove 15% tax
            const pricePerSession = priceAfterTax / sessions;
            const totalEarned = pricePerSession * completedSessions;
            const commission = totalEarned * 0.30; // 30% commission
            return {
                pricePerSession: pricePerSession.toFixed(2),
                totalEarned: totalEarned.toFixed(2),
                commission: commission.toFixed(2)
            };
        }

        // ==================== AUTH FUNCTIONS ====================
        function toggleForm() {
            document.getElementById('loginForm').style.display = 
                document.getElementById('loginForm').style.display === 'none' ? 'block' : 'none';
            document.getElementById('registerForm').style.display = 
                document.getElementById('registerForm').style.display === 'none' ? 'block' : 'none';
        }

        async function handleLogin() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            if (!email || !password) {
                document.getElementById('loginError').textContent = 'يرجى ملء جميع الحقول';
                return;
            }

            try {
                const response = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();
                if (data.success) {
                    token = data.token;
                    currentUser = data.user;
                    localStorage.setItem('token', token);
                    showApp();
                } else {
                    document.getElementById('loginError').textContent = data.error || 'خطأ في تسجيل الدخول';
                }
            } catch (error) {
                document.getElementById('loginError').textContent = 'خطأ في الاتصال بالخادم';
            }
        }

        async function handleRegister() {
            const name = document.getElementById('registerName').value;
            const email = document.getElementById('registerEmail').value;
            const password = document.getElementById('registerPassword').value;

            if (!name || !email || !password) {
                document.getElementById('registerError').textContent = 'يرجى ملء جميع الحقول';
                return;
            }

            try {
                const response = await fetch(`${API_URL}/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password })
                });

                const data = await response.json();
                if (data.success) {
                    token = data.token;
                    currentUser = data.user;
                    localStorage.setItem('token', token);
                    showApp();
                } else {
                    document.getElementById('registerError').textContent = data.error || 'خطأ في إنشاء الحساب';
                }
            } catch (error) {
                document.getElementById('registerError').textContent = 'خطأ في الاتصال بالخادم';
            }
        }

        function handleLogout() {
            token = null;
            currentUser = null;
            localStorage.removeItem('token');
            document.getElementById('authScreen').style.display = 'flex';
            document.getElementById('appScreen').style.display = 'none';
            document.getElementById('loginEmail').value = '';
            document.getElementById('loginPassword').value = '';
        }

        function showApp() {
            document.getElementById('authScreen').style.display = 'none';
            document.getElementById('appScreen').style.display = 'block';
            document.getElementById('userName').textContent = currentUser.name;
            document.getElementById('userEmail').textContent = currentUser.email;
            loadData();
        }

        // ==================== DATA FUNCTIONS ====================
        async function loadData() {
            try {
                const response = await fetch(`${API_URL}/data/subscribers`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const subscribers = await response.json();
                renderSubscribers(subscribers);
            } catch (error) {
                console.error('Error loading data:', error);
            }
        }

        function renderSubscribers(subscribers) {
            const container = document.getElementById('subscribersContainer');
            
            if (subscribers.length === 0) {
                container.innerHTML = '<p style="text-align: center; color: #999; padding: 20px;">لا توجد مشتركات حالياً</p>';
                return;
            }

            container.innerHTML = subscribers.map(s => {
                const completedSessions = (s.sessionDates || []).filter(d => d).length;
                const calc = calculateCommission(s.sessions, completedSessions);
                
                return `
                    <div class="subscriber-card">
                        <div class="subscriber-header">
                            <div class="subscriber-info">
                                <h3>${s.name}</h3>
                                <p>📱 ${s.phone}</p>
                                <p>📅 ${s.month}</p>
                            </div>
                            <button class="action-btn btn-delete" onclick="deleteSubscriber('${s.id}')">حذف</button>
                        </div>

                        <div class="subscriber-stats">
                            <div class="stat-box">
                                <div class="stat-label">إجمالي الجلسات</div>
                                <div class="stat-value">${s.sessions}</div>
                            </div>
                            <div class="stat-box">
                                <div class="stat-label">الجلسات المنفذة</div>
                                <div class="stat-value">${completedSessions}</div>
                            </div>
                            <div class="stat-box">
                                <div class="stat-label">المبلغ المكتسب</div>
                                <div class="stat-value">${calc.totalEarned}</div>
                            </div>
                            <div class="stat-box">
                                <div class="stat-label">العمولة (30%)</div>
                                <div class="stat-value">${calc.commission}</div>
                            </div>
                        </div>

                        <table class="sessions-table">
                            <thead>
                                <tr>
                                    ${Array.from({length: s.sessions}, (_, i) => `<th>جلسة ${i+1}</th>`).join('')}
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    ${Array.from({length: s.sessions}, (_, i) => `
                                        <td>
                                            <input type="date" class="session-input" id="session-${s.id}-${i}" 
                                                value="${s.sessionDates && s.sessionDates[i] ? s.sessionDates[i] : ''}"
                                                onchange="updateSessionDate('${s.id}', ${i}, this.value)">
                                        </td>
                                    `).join('')}
                                </tr>
                            </tbody>
                        </table>
                    </div>
                `;
            }).join('');
        }

        async function updateSessionDate(subscriberId, sessionIndex, date) {
            try {
                const response = await fetch(`${API_URL}/data/subscribers/${subscriberId}/session`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ sessionIndex, date })
                });

                const data = await response.json();
                if (data.success) {
                    loadData();
                }
            } catch (error) {
                console.error('Error updating session:', error);
            }
        }

        async function addSubscriber() {
            const name = document.getElementById('subscriberName').value;
            const phone = document.getElementById('subscriberPhone').value;
            const sessions = document.getElementById('subscriberSessions').value;
            const month = document.getElementById('subscriberMonth').value;

            if (!name || !phone || !sessions || !month) {
                alert('يرجى ملء جميع الحقول');
                return;
            }

            try {
                const response = await fetch(`${API_URL}/data/subscribers`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ 
                        name, 
                        phone, 
                        sessions: parseInt(sessions), 
                        month,
                        sessionDates: Array(parseInt(sessions)).fill('')
                    })
                });

                const data = await response.json();
                if (data.success) {
                    closeModal('addSubscriberModal');
                    document.getElementById('subscriberName').value = '';
                    document.getElementById('subscriberPhone').value = '';
                    document.getElementById('subscriberSessions').value = '';
                    document.getElementById('subscriberMonth').value = '';
                    loadData();
                }
            } catch (error) {
                console.error('Error adding subscriber:', error);
            }
        }

        async function deleteSubscriber(id) {
            if (!confirm('هل تريد حذف هذه المشتركة؟')) return;

            try {
                await fetch(`${API_URL}/data/subscribers/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                loadData();
            } catch (error) {
                console.error('Error deleting subscriber:', error);
            }
        }

        function openAddSubscriberModal() {
            document.getElementById('addSubscriberModal').classList.add('active');
        }

        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('active');
        }

        // ==================== INIT ====================
        window.addEventListener('load', () => {
            const savedToken = localStorage.getItem('token');
            if (savedToken) {
                token = savedToken;
                fetch(`${API_URL}/auth/me`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                }).then(r => r.json()).then(data => {
                    if (data.success) {
                        currentUser = data.user;
                        showApp();
                    } else {
                        localStorage.removeItem('token');
                    }
                });
            }
        });
    </script>
</body>
</html>
